name: atmos
description: ATMOS - A modern, feature-rich weather application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.3
  json_annotation: ^4.8.1

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.0.1

  # Maps
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  flutter_map_tile_caching: ^9.1.4

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # UI & Animations
  lottie: ^2.7.0
  shimmer: ^3.0.0
  fl_chart: ^0.65.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.3.0
  glass_kit: ^3.0.0
  intl: ^0.18.1

  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2

  # Utils
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.1
  get_it: ^7.6.4
  injectable: ^2.3.2
  freezed_annotation: ^2.4.1
  logger: ^2.0.2+1
  weather_icons: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  freezed: ^2.4.6
  hive_generator: ^2.0.1
  mockito: ^5.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/

