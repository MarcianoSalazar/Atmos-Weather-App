name: atmos
description: ATMOS Weather App - ITEC 106 Group 6
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1

  # Storage
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Serialization
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.3.0

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  fonts:
    - family: Rajdhani
      fonts:
        - asset: fonts/Rajdhani-Regular.ttf
          weight: 400
        - asset: fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: fonts/Rajdhani-Bold.ttf
          weight: 700
        - asset: fonts/Rajdhani-Light.ttf
          weight: 300
