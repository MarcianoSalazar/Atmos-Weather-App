pluginManagement {
    def localPropertiesFile = new File(rootDir, "local.properties")
    def properties = new Properties()
    assert localPropertiesFile.exists(), "local.properties file not found at ${localPropertiesFile.absolutePath}"
    localPropertiesFile.withInputStream { properties.load(it) }
    def flutterSdkPath = properties.getProperty("flutter.sdk")
    assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.0" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"

// Exclude jni module that causes build failures
gradle.projectsLoaded {
    gradle.allprojects {
        if (project.name == "jni") {
            project.tasks.configureEach {
                enabled = false
            }
        }
    }
}